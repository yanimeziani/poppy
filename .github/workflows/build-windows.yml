name: Build Poppy (Windows)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Version tag baked into the binary (e.g. 0.1.0)'
        required: false
        default: '0.1.0'
  push:
    branches:
      - master
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'NOTICE'
      - 'LICENSE*'
      - '.gitignore'
      - 'CODE_OF_CONDUCT.md'

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build arm64 installer
    runs-on: windows-latest
    timeout-minutes: 120

    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        shell: pwsh
        run: |
          rustup show
          rustup target add aarch64-pc-windows-msvc

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about

      - name: Locate Inno Setup
        shell: pwsh
        run: |
          $candidates = @(
            'C:\Program Files (x86)\Inno Setup 6',
            'C:\Program Files\Inno Setup 6'
          )
          $found = $candidates | Where-Object { Test-Path (Join-Path $_ 'ISCC.exe') } | Select-Object -First 1
          if (-not $found) {
            Write-Output "Inno Setup not preinstalled; installing via choco..."
            choco install innosetup --no-progress -y
            $found = $candidates | Where-Object { Test-Path (Join-Path $_ 'ISCC.exe') } | Select-Object -First 1
          }
          if (-not $found) { throw "ISCC.exe not found" }
          Write-Output "Using Inno Setup at: $found"
          echo $found | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Caches ~/.cargo/{registry,git} and target/. Saves the cache even on
      # job failure (`cache-on-failure: true`), so partial progress sticks
      # and subsequent runs only rebuild what actually changed.
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: poppy-oss-arm64
          cache-on-failure: true
          cache-all-crates: true

      - name: Bundle (oss channel, arm64)
        shell: pwsh
        env:
          GIT_RELEASE_TAG: ${{ github.event.inputs.release_tag || '0.1.0' }}
        run: |
          ./script/windows/bundle.ps1 -CHANNEL oss -ARCH arm64 -RELEASE_TAG $env:GIT_RELEASE_TAG

      - name: Locate build outputs
        id: find
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path target -Recurse -Filter 'poppy.exe' | Select-Object -First 1
          $installer = Get-ChildItem -Path script\windows\Output -Filter '*.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
            Write-Output "Binary: $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"
          }
          if ($installer) {
            "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
            Write-Output "Installer: $($installer.FullName) ($([math]::Round($installer.Length/1MB,1)) MB)"
          }

      - name: Upload binary artifact
        if: steps.find.outputs.exe_path
        uses: actions/upload-artifact@v4
        with:
          name: poppy-windows-arm64-binary
          path: ${{ steps.find.outputs.exe_path }}
          if-no-files-found: error

      - name: Upload installer artifact
        if: steps.find.outputs.installer_path
        uses: actions/upload-artifact@v4
        with:
          name: poppy-windows-arm64-installer
          path: ${{ steps.find.outputs.installer_path }}
          if-no-files-found: error

      # Auto-publish: when this workflow runs on master and produces an
      # installer, drop a draft release with the installer attached. The
      # tag is the release_tag input (default 0.1.0); existing release
      # under the same tag is replaced cleanly.
      - name: Create / update draft release
        if: github.ref == 'refs/heads/master' && steps.find.outputs.installer_path
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v${{ github.event.inputs.release_tag || '0.1.0' }}"
          $title = "Poppy $tag"
          $notes = @"
          Automated build of $tag from commit ${{ github.sha }}.

          ## Downloads

          - **Poppy-Setup-arm64.exe** — Windows ARM64 installer (Windows 10 1903+ / Windows 11)

          The installer registers AppId ``poppy-terminal-oss``, which means it
          upgrades any prior Poppy installation (including stub releases) in
          place.
          "@

          # If an existing release uses this tag, replace it cleanly. Drafts
          # have no git tag, so --cleanup-tag would 422 on them.
          if (gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null) {
            $isDraft = gh release view $tag --repo $env:GITHUB_REPOSITORY --json isDraft --jq '.isDraft'
            if ($isDraft -eq 'true') {
              gh release delete $tag --yes --repo $env:GITHUB_REPOSITORY
            } else {
              gh release delete $tag --yes --cleanup-tag --repo $env:GITHUB_REPOSITORY
            }
          }

          gh release create $tag `
            "${{ steps.find.outputs.installer_path }}" `
            "${{ steps.find.outputs.exe_path }}" `
            --draft `
            --repo $env:GITHUB_REPOSITORY `
            --title $title `
            --notes $notes
