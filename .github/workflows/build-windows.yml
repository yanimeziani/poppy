name: Build Poppy (Windows)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Version tag baked into the binary (e.g. 0.1.0)'
        required: false
        default: '0.1.0'
  push:
    branches:
      - master
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build x64 installer
    runs-on: windows-latest
    timeout-minutes: 120

    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        shell: pwsh
        run: |
          rustup show
          rustup target add x86_64-pc-windows-msvc

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup --version=6.2.2 --no-progress -y
          # Ensure ISCC is on PATH for subsequent steps.
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: target-${{ runner.os }}-oss-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            target-${{ runner.os }}-oss-

      - name: Bundle (oss channel)
        shell: pwsh
        env:
          GIT_RELEASE_TAG: ${{ github.event.inputs.release_tag || '0.1.0' }}
        run: |
          ./script/windows/bundle.ps1 -CHANNEL oss -ARCH x64 -RELEASE_TAG $env:GIT_RELEASE_TAG

      - name: Locate build outputs
        id: find
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path target -Recurse -Filter 'poppy.exe' | Select-Object -First 1
          $installer = Get-ChildItem -Path script\windows\Output -Filter '*.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
            Write-Output "Binary: $($exe.FullName) ($([math]::Round($exe.Length/1MB,1)) MB)"
          }
          if ($installer) {
            "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
            Write-Output "Installer: $($installer.FullName) ($([math]::Round($installer.Length/1MB,1)) MB)"
          }

      - name: Upload binary artifact
        if: steps.find.outputs.exe_path
        uses: actions/upload-artifact@v4
        with:
          name: poppy-windows-x64-binary
          path: ${{ steps.find.outputs.exe_path }}
          if-no-files-found: error

      - name: Upload installer artifact
        if: steps.find.outputs.installer_path
        uses: actions/upload-artifact@v4
        with:
          name: poppy-windows-x64-installer
          path: ${{ steps.find.outputs.installer_path }}
          if-no-files-found: error
